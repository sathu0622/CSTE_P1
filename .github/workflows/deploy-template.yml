name: CD Deploy Template

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print selected deployment target
        run: |
          echo "Provider: azure"
          echo "Environment: ${{ inputs.environment }}"
          echo "Use GHCR images published by CI workflow."

      - name: Azure deployment placeholder (Container Apps)
        run: |
          echo "Configure these secrets before enabling real deploy:"
          echo "AZURE_CREDENTIALS, AZURE_RESOURCE_GROUP, AZURE_CONTAINERAPPS_ENV"
          echo "Then deploy each service image from GHCR to Azure Container Apps."
