name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: ecommerce-ci-cd-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}
  SERVICES_ROOT: ecommerce-microservices

jobs:
  build-lint-sast-and-push:
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        service: [user-service, product-service, order-service, payment-service]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        working-directory: ${{ env.SERVICES_ROOT }}/${{ matrix.service }}
        run: npm install

      - name: Run lint
        working-directory: ${{ env.SERVICES_ROOT }}/${{ matrix.service }}
        run: npm run lint

      - name: Debug Snyk token presence (safe)
        run: |
          if [ -n "$SNYK_TOKEN" ]; then
            echo "SNYK token present: yes"
          else
            echo "SNYK token present: no"
          fi

      - name: Snyk SAST and dependency scan
        if: ${{ env.SNYK_TOKEN != '' }}
        working-directory: ${{ env.SERVICES_ROOT }}/${{ matrix.service }}
        run: |
          set -euo pipefail
          npx snyk@latest auth "$SNYK_TOKEN"
          for attempt in 1 2 3; do
            echo "Running Snyk test (attempt $attempt/3)"
            set +e
            output=$(npx snyk@latest test --severity-threshold=high --fail-on=upgradable 2>&1)
            exit_code=$?
            set -e
            echo "$output"
            if [ $exit_code -eq 0 ]; then
              break
            fi
            if echo "$output" | grep -q "SNYK-CLI-0000"; then
              if [ "$attempt" -lt 3 ]; then
                echo "Transient Snyk timeout detected. Retrying after 10s..."
                sleep 10
                continue
              fi
            fi
            exit $exit_code
          done

      - name: Skip Snyk when token missing
        if: ${{ env.SNYK_TOKEN == '' }}
        run: echo "SNYK_TOKEN not configured. Add it in repository secrets to enable DevSecOps scanning."

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.SERVICES_ROOT }}/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/ecommerce-${{ matrix.service }}:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/ecommerce-${{ matrix.service }}:latest

  deploy-to-aca:
    name: Deploy to Azure Container Apps (${{ matrix.service }})
    if: ${{ github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master') }}
    needs: build-lint-sast-and-push
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: user-service
            app_name_secret: AZURE_CONTAINERAPP_USER
            health_path: /health
          - service: product-service
            app_name_secret: AZURE_CONTAINERAPP_PRODUCT
            health_path: /health
          - service: order-service
            app_name_secret: AZURE_CONTAINERAPP_ORDER
            health_path: /health
          - service: payment-service
            app_name_secret: AZURE_CONTAINERAPP_PAYMENT
            health_path: /health

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve app name for service
        id: app
        run: |
          case "${{ matrix.service }}" in
            user-service) echo "name=${{ secrets.AZURE_CONTAINERAPP_USER }}" >> "$GITHUB_OUTPUT" ;;
            product-service) echo "name=${{ secrets.AZURE_CONTAINERAPP_PRODUCT }}" >> "$GITHUB_OUTPUT" ;;
            order-service) echo "name=${{ secrets.AZURE_CONTAINERAPP_ORDER }}" >> "$GITHUB_OUTPUT" ;;
            payment-service) echo "name=${{ secrets.AZURE_CONTAINERAPP_PAYMENT }}" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Validate required deployment values
        run: |
          set -euo pipefail
          test -n "${{ secrets.AZURE_RESOURCE_GROUP }}"
          test -n "${{ steps.app.outputs.name }}"
          test -n "${{ secrets.GHCR_USERNAME }}"
          test -n "${{ secrets.GHCR_PAT }}"

      - name: Deploy image with retry
        uses: azure/cli@v2
        with:
          azcliversion: 2.64.0
          inlineScript: |
            set -euo pipefail
            IMAGE="${{ env.IMAGE_PREFIX }}/ecommerce-${{ matrix.service }}:${{ github.sha }}"
            APP_NAME="${{ steps.app.outputs.name }}"
            RG="${{ secrets.AZURE_RESOURCE_GROUP }}"

            for attempt in 1 2 3; do
              echo "Deploy attempt ${attempt}/3 for ${APP_NAME}"
              if az containerapp update \
                --name "${APP_NAME}" \
                --resource-group "${RG}" \
                --image "${IMAGE}" \
                --registry-server "${{ env.REGISTRY }}" \
                --registry-username "${{ secrets.GHCR_USERNAME }}" \
                --registry-password "${{ secrets.GHCR_PAT }}" \
                --set-env-vars "NODE_ENV=production" "JWT_SECRET=${{ secrets.JWT_SECRET }}" "SERVICE_SHARED_SECRET=${{ secrets.SERVICE_SHARED_SECRET }}"; then
                echo "Deploy success"
                exit 0
              fi
              if [ "${attempt}" -eq 3 ]; then
                echo "Deployment failed after retries"
                exit 1
              fi
              sleep 15
            done

      - name: Health check with retry
        uses: azure/cli@v2
        with:
          azcliversion: 2.64.0
          inlineScript: |
            set -euo pipefail
            APP_NAME="${{ steps.app.outputs.name }}"
            RG="${{ secrets.AZURE_RESOURCE_GROUP }}"
            FQDN="$(az containerapp show -n "${APP_NAME}" -g "${RG}" --query properties.configuration.ingress.fqdn -o tsv)"
            URL="https://${FQDN}${{ matrix.health_path }}"
            echo "Checking ${URL}"

            for attempt in $(seq 1 30); do
              code="$(curl -s -o /dev/null -w "%{http_code}" "${URL}" || true)"
              if [ "${code}" = "200" ]; then
                echo "Healthy"
                exit 0
              fi
              echo "Attempt ${attempt}/30 -> HTTP ${code}"
              sleep 10
            done

            echo "Health check failed"
            exit 1
