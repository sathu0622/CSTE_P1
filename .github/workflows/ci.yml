name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build-lint-sast-and-push:
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [user-service, product-service, order-service, payment-service]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        working-directory: ecommerce-microservices/${{ matrix.service }}
        run: npm install

      - name: Run lint
        working-directory: ecommerce-microservices/${{ matrix.service }}
        run: npm run lint

      - name: Debug Snyk token presence (safe)
        run: |
          if [ -n "$SNYK_TOKEN" ]; then
            echo "SNYK token present: yes"
          else
            echo "SNYK token present: no"
          fi

      - name: Snyk SAST and dependency scan
        if: ${{ env.SNYK_TOKEN != '' }}
        working-directory: ecommerce-microservices/${{ matrix.service }}
        run: |
          npm install -g snyk
          snyk auth $SNYK_TOKEN
          snyk test --severity-threshold=high

      - name: Skip Snyk when token missing
        if: ${{ env.SNYK_TOKEN == '' }}
        run: echo "SNYK_TOKEN not configured. Add it in repository secrets to enable DevSecOps scanning."

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ecommerce-microservices/${{ matrix.service }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ecommerce-${{ matrix.service }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/ecommerce-${{ matrix.service }}:latest
